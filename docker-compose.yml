version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/frontend
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - appnet
    restart: unless-stopped

  php:
    build:
      context: ./docker
      dockerfile: Dockerfile.php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - octave
    networks:
      - appnet
    restart: unless-stopped

  octave:
    build:
      context: ./docker
      dockerfile: Dockerfile.octave
    networks:
      - appnet
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-casapp}
      MYSQL_USER: ${DB_USER:-casuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-caspass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - appnet
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge
