<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="logs.title">Logs</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="../index.html">
            CAS Simulator
        </a>

        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html" data-i18n="nav.home">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="console.html" data-i18n="nav.console">CAS Console</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="pendulum.html" data-i18n="nav.pendulum">Pendulum</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="ballbeam.html" data-i18n="nav.ballbeam">Ball Beam</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="stats.html" data-i18n="nav.stats">Statistics</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="logs.html" data-i18n="nav.logs">Logs</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="docs.html" data-i18n="nav.docs">API Docs</a>
                </li>

                <li class="nav-item">
                    <div class="language-switcher">
                        <button class="language-button" type="button" data-lang="sk" data-i18n="lang.sk">SK</button>
                        <button class="language-button" type="button" data-lang="en" data-i18n="lang.en">EN</button>
                    </div>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="hero-card">

        <div class="hero-top-line"></div>

        <div class="card-body p-5">

            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">

                <div>
                    <h1 class="main-title mb-2" data-i18n="logs.title">
                        Request Logs
                    </h1>

                    <p class="main-subtitle mb-0" data-i18n="logs.subtitle">
                        Overview of CAS requests executed through the REST API.
                    </p>
                </div>

                <div class="d-flex flex-wrap gap-2">

                    <button
                            id="refreshLogsBtn"
                            class="btn btn-primary"
                            type="button"
                            data-i18n="logs.refresh"
                    >
                        Refresh logs
                    </button>

                    <a
                            id="exportCsvBtn"
                            class="btn btn-outline-secondary"
                            href="/api/logs/export"
                            data-i18n="logs.exportCsv"
                    >
                        Export CSV
                    </a>

                </div>

            </div>

            <div class="simulation-panel">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4 class="mb-0" data-i18n="logs.entries">
                        Log entries
                    </h4>

                    <span
                            id="logsStatus"
                            class="simulation-status"
                    >
                        <span data-i18n="common.waiting">Waiting</span>
                    </span>

                </div>

                <div
                        id="logsMessage"
                        class="mb-3"
                ></div>

                <div class="table-responsive">

                    <table class="table align-middle custom-table">

                        <thead>
                        <tr>
                            <th data-i18n="logs.dateTime">Date / Time</th>
                            <th data-i18n="logs.command">Command</th>
                            <th data-i18n="logs.status">Status</th>
                            <th data-i18n="logs.error">Error</th>
                        </tr>
                        </thead>

                        <tbody id="logsTableBody">

                        <tr>
                            <td colspan="4" class="text-muted" data-i18n="logs.emptyInitial">
                                No logs loaded yet.
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>
<script src="../js/loading.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/translations.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/logs.js"></script>

</body>
</html>
