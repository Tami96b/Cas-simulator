<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title data-i18n-title="console.title">CAS Console</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="../index.html">
            CAS Simulator
        </a>

        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html" data-i18n="nav.home">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="console.html" data-i18n="nav.console">
                        CAS Console
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="pendulum.html" data-i18n="nav.pendulum">
                        Pendulum
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="ballbeam.html" data-i18n="nav.ballbeam">
                        Ball Beam
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="stats.html" data-i18n="nav.stats">
                        Statistics
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="logs.html" data-i18n="nav.logs">
                        Logs
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="docs.html" data-i18n="nav.docs">
                        API Docs
                    </a>
                </li>

                <li class="nav-item">
                    <div class="language-switcher">
                        <button class="language-button" type="button" data-lang="sk" data-i18n="lang.sk">SK</button>
                        <button class="language-button" type="button" data-lang="en" data-i18n="lang.en">EN</button>
                    </div>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="hero-card">

        <div class="hero-top-line"></div>

        <div class="card-body p-5">

            <h1 class="main-title" data-i18n="console.title">
                CAS Console
            </h1>

            <p class="main-subtitle" data-i18n="console.subtitle">
                Execute Octave commands through the REST API and inspect the returned output directly in the browser.
            </p>

            <div class="row mt-5">

                <div class="col-lg-5 mb-4">

                    <div class="simulation-panel">

                        <h4 class="mb-4" data-i18n="console.command">
                            Octave Command
                        </h4>

                        <div class="mb-4">
                            <textarea
                                    id="commandInput"
                                    class="form-control command-input"
                                    rows="8"
                                    placeholder="Enter Octave command..."
                                    data-i18n-placeholder="console.placeholder"
                            ></textarea>
                        </div>

                        <div class="d-flex flex-wrap gap-3 align-items-center">

                            <button
                                    id="executeBtn"
                                    class="btn btn-primary"
                                    data-i18n="console.execute"
                            >
                                Execute
                            </button>

                            <button
                                    id="clearBtn"
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    data-i18n="console.clear"
                            >
                                Clear output
                            </button>

                        </div>

                        <div class="quick-examples">

                            <div class="quick-title" data-i18n="console.quickExamples">
                                Quick examples
                            </div>

                            <div class="quick-buttons">

                                <button
                                        type="button"
                                        class="quick-example-btn"
                                        data-command="a = 5 + 3&#10;a * 2"
                                        data-i18n="console.exampleBasic"
                                >
                                    Basic calculation
                                </button>

                                <button
                                        type="button"
                                        class="quick-example-btn"
                                        data-command="t = 0:0.1:10;&#10;y = sin(t);&#10;disp(y)"
                                        data-i18n="console.exampleSine"
                                >
                                    Sine values
                                </button>

                                <button
                                        type="button"
                                        class="quick-example-btn"
                                        data-command="A = [1 2; 3 4]&#10;det(A)"
                                        data-i18n="console.exampleMatrix"
                                >
                                    Matrix determinant
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-lg-7 mb-4">

                    <div class="simulation-panel">

                        <h4 class="mb-3" data-i18n="console.output">
                            Output
                        </h4>

                        <div
                                id="output"
                                class="console-box console-output-box"
                        >
                            <div class="console-muted" data-i18n="console.waiting">
                                Waiting for command execution...
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../js/loading.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/translations.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
